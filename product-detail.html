// ─── Render product detail ───
function getProduct(id) {
    return productDB.find(p => p.id === id);
}

function renderProduct() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const product = getProduct(id);
    const container = document.getElementById('productContent');

    if (!product) {
        container.innerHTML = `
            <div class="not-found">
                <h2>产品未找到</h2>
                <p>抱歉，您查找的产品不存在。请返回 <a href="index.html#products">产品中心</a> 浏览所有产品。</p>
            </div>`;
        return;
    }

    // Update page title
    document.title = `${product.name} - ${product.catName} - 湖南昱烯瓴新材料有限公司`;

    // Build tags HTML
    const tagsHTML = product.tags.length > 0
        ? `<div class="product-tags">${product.tags.map(t => `<span class="product-tag">${t}</span>`).join('')}</div>`
        : '';

    // Related products
    const relatedHTML = product.related.map(rid => {
        const rp = getProduct(rid);
        if (!rp) return '';
        return `<a href="product-detail.html?id=${rp.id}" class="related-card">
            <div class="r-name">${rp.name}</div>
            <div class="r-spec">${rp.subtitle.substring(0, 30)}...</div>
        </a>`;
    }).join('');

    container.innerHTML = `
    <section class="product-hero" style="background: ${product.heroBg};">
        <div class="breadcrumb">
            <a href="index.html">首页</a> / <a href="index.html#products">产品中心</a> / ${product.catName} / ${product.name}
        </div>
        ${tagsHTML}
        <h1>${product.name}</h1>
        <p class="subtitle">${product.subtitle}</p>
    </section>

    <div class="content-wrapper">
        <!-- 产品概述 -->
        <div class="detail-section">
            <h2><span class="icon">📋</span> 产品概述</h2>
            ${product.overview.map(p => `<p>${p}</p>`).join('')}
        </div>

        <!-- 技术参数 -->
        <div class="detail-section">
            <h2><span class="icon">🔬</span> 技术参数</h2>
            <table class="specs-table">
                ${product.specs.map(s => `<tr><th>${s[0]}</th><td>${s[1]}</td></tr>`).join('')}
            </table>
        </div>

        <!-- 核心优势 -->
        <div class="detail-section">
            <h2><span class="icon">⭐</span> 核心优势</h2>
            <ul class="features-list">
                ${product.features.map(f => `<li><strong>${f[0]}</strong>${f[1]}</li>`).join('')}
            </ul>
        </div>

        <!-- 应用场景 -->
        <div class="detail-section">
            <h2><span class="icon">🏭</span> 应用场景</h2>
            <div class="app-grid">
                ${product.applications.map(a => `
                    <div class="app-card">
                        <div class="app-icon">${a[0].substring(0,2)}</div>
                        <h4>${a[0].substring(2)}</h4>
                        <p>${a[1]}</p>
                    </div>
                `).join('')}
            </div>
        </div>

        <!-- 相关产品 -->
        ${product.related.length > 0 ? `
        <div class="detail-section">
            <h2><span class="icon">🔗</span> 相关产品</h2>
            <div class="related-grid">
                ${relatedHTML}
            </div>
        </div>` : ''}

        <!-- CTA -->
        <div class="cta-bar">
            <h3>对该产品感兴趣？</h3>
            <p>欢迎联系我们获取产品样品、技术方案或报价咨询</p>
            <div>
                <a href="index.html#contact" class="btn-contact">联系我们</a>
            </div>
        </div>
    </div>`;
}

renderProduct();
