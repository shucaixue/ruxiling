<p>昱烯瓴新材料凭借在碳纳米材料领域的深厚积累，聚焦单壁碳纳米管的规模化制备技术攻关。公司以自主研发核心工艺与设备为基础，突破成本与良率瓶颈，推动单壁碳纳米管从实验室走向产业化。该项目的实施将填补国内高端单壁碳纳米管规模化生产的空白，为湖南省新材料产业集群建设和国家战略性新兴产业高质量发展提供核心材料支撑。</p>`

        body: `<p>MXenes是一种新型的二维材料，近年来引起了广泛的研究兴趣。它是由MAX相处理得到的类石墨烯结构材料，具有许多优异的性质和潜在的应用。</p>

<h2>MXenes的起源与结构</h2>
<p>MXenes最早由美国Drexel大学的Yury Gogotsi教授和Michel Barsoum教授于2011年发现。它们是由一类三元层状化合物MAX相剥离而来，具有统一的化学式Mn+1AXn，其中M是早期过渡金属，A是Ⅲ、Ⅳ主族元素，X是C或者N，n=1、2、3等。MXenes的结构特点是M原子和A原子层交替排列，形成近密堆积六方层状结构，X原子填充于八面体空隙。MXenes材料的二维结构类似于石墨烯，但具有不同的化学成分和性质。</p>

<h2>MXenes的制备方法</h2>
<p>制备MXenes的方法多种多样，随着研究的深入，制备工艺也在不断发展。目前常用的制备方法包括含氟溶液刻蚀和碱溶液化学刻蚀。含氟溶液刻蚀是最常用的方法，使用含F⁻离子的溶液（如HF溶液、LiF和HCl的混合物或NH₄HF₂溶液）将MAX相浸泡，使其破坏掉M-A键，然后将MXene从混合溶液中分离。碱溶液化学刻蚀则是通过含氟离子的溶液刻蚀MAX相来制备MXenes材料。</p>

<h2>MXenes的性质与应用</h2>
<p>MXenes材料具有优异的机械、电学、光学和电化学性质，展示出卓越的能源转换和电化学存储潜力。它们在锂/钠离子电池、超级电容器、光电催化剂、太阳能利用、生物医药和传感器等领域具有广泛的应用潜力。MXenes材料的导电性能接近金属，同时具有优异的亲水性，这使得它们在导电材料和电化学储能材料方面具有独特的优势。此外，MXenes材料还具有可调控的表面官能团，可以通过化学修饰来改变其性质和功能。</p>`

        body: `<p>铜基石墨烯复合材料是一种新型复合材料，它以铜或铜合金为基体，并通过引入石墨烯作为增强相，从而显著提高材料的整体性能。石墨烯是一种由碳原子以sp²杂化轨道形成的单层二维蜂窝状晶格结构，具有优异的机械、导电和导热性能。</p>

<h2>组成与制备方法</h2>
<h3>基体材料</h3>
<p>主要是纯铜或铜合金。</p>
<h3>增强相</h3>
<p>石墨烯，通常以单层或多层形式存在。</p>
<h3>制备方法</h3>
<p><strong>粉末冶金法：</strong>将铜粉与石墨烯粉末均匀混合，通过压制和烧结制备复合材料。</p>
<p><strong>电沉积法：</strong>在电解液中加入石墨烯，通过电沉积工艺使其与铜基体结合。</p>
<p><strong>化学气相沉积（CVD）法：</strong>将石墨烯直接生长在铜基体表面。</p>
<p><strong>热压烧结法：</strong>将混合均匀的铜粉和石墨烯在高温高压下烧结成型。</p>

<h2>应用领域</h2>
<p><strong>电子与电气工程：</strong>用于制造高导电、高导热的电子元件、散热片、互连材料等。</p>
<p><strong>机械制造：</strong>用于制造高强度、高耐磨的机械零部件，如轴承、齿轮等。</p>
<p><strong>热管理系统：</strong>在需要高效散热的领域，如高性能计算设备、LED照明等，铜基石墨烯复合材料可用于制造散热组件。</p>
<p><strong>航空航天：</strong>由于其优异的综合性能，该材料在航空航天领域有广泛应用，如导电连接器、散热结构件等。</p>`

function getNews(id) {
    return newsDB.find(n => n.id === id);
}

function renderNews() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const article = getNews(id);

    if (!article) {
        document.getElementById('articleHero').style.display = 'none';
        document.getElementById('notFound').style.display = 'block';
        document.getElementById('articleBody').innerHTML = '';
        document.getElementById('relatedNews').innerHTML = '';
        return;
    }

    document.getElementById('articleTitle').textContent = article.title;
    document.getElementById('articleDate').textContent = article.date;
    document.getElementById('bcTitle').textContent = article.title;
    document.getElementById('articleBody').innerHTML = article.body;
    document.title = article.title + ' - 湖南昱烯瓴新材料有限公司';

    const related = newsDB.filter(n => n.id !== id);
    document.getElementById('relatedNews').innerHTML = `
        <h3>更多新闻动态</h3>
        <div class="related-list">
            ${related.map(n => `
                <a href="news-detail.html?id=${n.id}" class="related-item">
                    <span>${n.title}</span>
                    <span class="rn-date">${n.date}</span>
                </a>
            `).join('')}
        </div>`;
}

renderNews();
</script>
